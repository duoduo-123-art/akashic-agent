<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akashic Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">Akashic Dashboard</div>
          <div class="brand-sub">Session / Message Explorer</div>
        </div>
      </div>
      <div class="topbar-filters">
        <label class="search">
          <span>⌕</span>
          <input id="msgSearch" type="text" placeholder="搜索消息内容">
        </label>
        <select id="msgRoleFilter">
          <option value="">全部 role</option>
          <option value="user">user</option>
          <option value="assistant">assistant</option>
          <option value="system">system</option>
          <option value="tool">tool</option>
        </select>
        <div class="active-session-chip hidden" id="activeSessionChip">
          <span>session</span>
          <code id="activeSessionText"></code>
          <button id="clearSessionFilter" type="button">×</button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sessions-pane">
        <div class="pane-head">
          <div>
            <div class="pane-kicker">Sessions</div>
            <div class="pane-title" id="sessionCountTitle">0 个会话</div>
          </div>
        </div>
        <div class="filters-stack">
          <label class="search search-small">
            <span>⌕</span>
            <input id="sessionSearch" type="text" placeholder="过滤 session">
          </label>
          <select id="sessionChannelFilter">
            <option value="">全部 channel</option>
          </select>
        </div>
        <button class="all-messages-row" id="allMessagesButton" type="button">
          <span>全部消息</span>
          <strong id="allMessagesCount">0</strong>
        </button>
        <div class="session-list" id="sessionList"></div>
      </aside>

      <section class="messages-pane">
        <div class="batch-bar hidden" id="batchBar">
          <span id="batchCount">已选 0 条</span>
          <button class="danger-ghost" id="batchDeleteButton" type="button">批量删除</button>
          <button class="ghost" id="clearSelectionButton" type="button">取消选择</button>
        </div>

        <div class="table-head">
          <label class="checkbox-cell"><input id="selectAllCheckbox" type="checkbox"></label>
          <div>Session Key</div>
          <div>Seq</div>
          <div>Content</div>
          <div>Timestamp</div>
          <div>Role</div>
          <div></div>
        </div>
        <div class="table-body" id="messageTable"></div>
        <footer class="table-foot">
          <div id="messageMeta">共 0 条</div>
          <div class="pager">
            <button class="ghost" id="prevPageButton" type="button">‹</button>
            <span id="pageText">1 / 1</span>
            <button class="ghost" id="nextPageButton" type="button">›</button>
          </div>
        </footer>
      </section>

      <aside class="detail-pane" id="detailPane">
        <div class="detail-empty">
          <div class="detail-empty-title">消息详情</div>
          <div class="detail-empty-text">点开一条消息后，这里会显示完整内容、JSON 字段和所属 session 信息。</div>
        </div>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop"></div>
  <div class="modal hidden" id="modal"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
