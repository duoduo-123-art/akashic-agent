services:
    rsshub:
        # two ways to enable puppeteer:
        # * comment out marked lines, then use this image instead: diygod/rsshub:chromium-bundled
        # * (consumes more disk space and memory) leave everything unchanged
        image: diygod/rsshub # or ghcr.io/diygod/rsshub
        restart: always
        ports:
            - '1200:1200'
        environment:
            NODE_ENV: production
            CACHE_TYPE: redis
            REDIS_URL: 'redis://redis:6379/'
            PUPPETEER_WS_ENDPOINT: 'ws://browserless:3000' # marked
            PUPPETEER_REAL_BROWSER_SERVICE: 'http://real-browser:3000' # marked
            BILIBILI_COOKIE_287092105: 'buvid3=90F61C36-9F47-51BF-614A-90563037CDD777156infoc; b_nut=1756998477; _uuid=D87CFC105-E9C8-569A-E921-A257ADA57ABD78096infoc; buvid_fp=09cbafb793c406310359a07c8980f90d; enable_web_push=DISABLE; buvid4=6B861BD5-6F04-26D0-3160-A76E9CF7187D79690-025090423-KWtZDwT1esP1dWjGdla3Qw%3D%3D; SESSDATA=4e989f7a%2C1772550590%2C49d8c%2A92CjCAXghb3324Oh3egd_PaDwk6eK0PrHVoBDp0gv0tZnhkRRkajC5TmxXGZoqAv9ysigSVkQ0b2VENGJYSmwtbDI2bXEtbTBUU0dXVFBpcWRILUV5aG1TX3pkcHcyeDNGcmVnVS1nMm1zMnExY054dGc2SENLTWprZnFFZ2k1ZkJ3dzdkV2JIaEpRIIEC; bili_jct=0d0fcce5bdbf55ec39f67e7c032573c8; DedeUserID=287092105; DedeUserID__ckMd5=67e5dbfc57c706b5; theme-tip-show=SHOWED; theme-avatar-tip-show=SHOWED; rpdid=0zbfvRPWlq|rmy8FABU|QSh|3w1VKlj1; CURRENT_QUALITY=80; theme-switch-show=SHOWED; hit-dyn-v2=1; bili_ticket=eyJhbGciOiJIUzI1NiIsImtpZCI6InMwMyIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzIwOTcyOTMsImlhdCI6MTc3MTgzODAzMywicGx0IjotMX0.k_BrKLnM1-CaLu_JcWmRknQiT4q5gG0mJMTz4sLZVlM; bili_ticket_expires=1772097233; bp_t_offset_287092105=1172636808949792768; CURRENT_FNVAL=4048; home_feed_column=4; browser_resolution=1038-865; b_lsid=C31F4A08_19C9704A57D'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:1200/healthz']
            interval: 30s
            timeout: 10s
            retries: 3
        depends_on:
            - redis
            - browserless # marked

    real-browser:
        image: ghcr.io/hyoban/puppeteer-real-browser-hono
        restart: always
        ports:
            - '4441:3000'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000']
            interval: 30s
            timeout: 10s
            retries: 3

    browserless: # marked
        image: browserless/chrome # marked
        restart: always # marked
        ulimits: # marked
            core: # marked
                hard: 0 # marked
                soft: 0 # marked
        healthcheck: # marked
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/pressure'] # marked
            interval: 30s # marked
            timeout: 10s # marked
            retries: 3 # marked

    redis:
        image: redis:alpine
        restart: always
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 5s

volumes:
    redis-data:
